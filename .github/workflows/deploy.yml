name: CI/CD with Docker

# main 브랜치에 push 될 때마다 실행
on:
  push:
    branches:
      - main

jobs:
  deploy:
    # GitHub Actions가 실행될 환경
    runs-on: ubuntu-latest

    steps:
      # GitHub Repository 코드 가져오기
      - uses: actions/checkout@v4

      # Java 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # GitHub Secrets에 저장한 application.yml 생성
      # application.yml은 gitignore 처리되어 있으므로 CI 과정에서 생성
      - name: Make application.yml
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION }}" > src/main/resources/application.yml

      # Gradle 캐시 사용
      # 의존성 다운로드 시간을 줄여 빌드 속도 향상
      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # gradlew 실행 권한 부여
      - name: Grant execute permission
        run: chmod +x ./gradlew

      # Spring Boot 프로젝트 빌드
      # 테스트는 제외(-x test)
      - name: Build with Gradle
        run: ./gradlew build -x test

      # Docker Hub 로그인
      # 이후 Docker Image Push를 위해 필요
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker Image 빌드 후 Docker Hub에 Push
      - name: Docker build & push
        uses: docker/build-push-action@v6
        with:
          # Docker 빌드 기준 경로
          context: .

          # 사용할 Dockerfile 위치
          file: ./Dockerfile

          # EC2(t4g 계열 ARM 서버)용 이미지 생성
          platforms: linux/arm64/v8

          # Docker Hub에 Push 여부
          push: true

          # Docker Hub Repository 이름
          tags: ${{ secrets.DOCKER_REPO }}:latest

      # EC2 서버에 접속하여 최신 Docker Image 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          # GitHub Secrets에 저장한 EC2 정보 사용
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}

          script: |
            # Docker Hub에서 최신 이미지 다운로드
            sudo docker pull ${{ secrets.DOCKER_REPO }}:latest

            # 기존 컨테이너 중지
            sudo docker stop efub6-seminar-front || true

            # 기존 컨테이너 삭제
            sudo docker rm efub6-seminar-front || true

            # 최신 이미지로 컨테이너 실행
            sudo docker run -d \
              --name efub6-seminar-front \
              -p 8080:8080 \
              ${{ secrets.DOCKER_REPO }}:latest

            # 사용하지 않는 Docker 이미지 정리
            sudo docker image prune -f